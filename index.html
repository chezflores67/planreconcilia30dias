const mensajes = [
  { dia:1,  emoji:"💑", titulo:"¡Comienza tu Día 1!",

  { dia:2,  emoji:"💬", titulo:"Día 2 — Pregunta de verdad",

  { dia:3,  emoji:"✍️", titulo:"Día 3 — Tu carta",

  { dia:4,  emoji:"📸", titulo:"Día 4 — El archivo del amor",

  { dia:5,  emoji:"🚪", titulo:"Día 5 — El abrazo del umbral",

    email_asunto:"Día 5 — 6 segundos que cambian la química del amor",
    email_cuerpo:"Hola {nombre},\n\nHoy establecen su ritual del umbral: un abrazo de mínimo 6 segundos cada vez que uno llega.\n\nLa ciencia lo confirma: 6 segundos es el tiempo mínimo para liberar oxitocina, la hormona del vínculo.\n\nUn ritual pequeño que construye algo enorme. 🚪\n\n💑 Juntos de Nuevo"},
  { dia:6,  emoji:"💧", titulo:"Día 6 — Nombrar lo que duele",
    push:"{nombre}, hoy cada uno completa: 'Me duele que... pero entiendo que...' Un solo tema. Con amor. Lo que duele y no se dice se convierte en distancia.",

  { dia:7,  emoji:"🌙", titulo:"Día 7 — Sin pantallas esta noche",

    email_cuerpo:"Hola {nombre},\n\n¡Una semana! Ya son diferentes de como empezaron.\n\nHoy: sin televisión, teléfono ni tablet después de las 8 PM. Cocinen, jueguen, platiquen.\n\nSi el silencio se siente incómodo, es buena señal: hay algo importante esperando ser dicho. 🌙\n\n💑 Juntos de Nuevo"},
  { dia:8,  emoji:"🗺️", titulo:"Día 8 — El mapa de tu pareja",

  { dia:9,  emoji:"🙏", titulo:"Día 9 — La deuda de gratitud",

  { dia:10, emoji:"🩹", titulo:"Día 10 — Sanar una herida",

    email_cuerpo:"Hola {nombre},\n\nHoy eligen UNA herida del pasado que nunca cerró del todo.\n\nQuien la causó dice: 'Me arrepiento de...' y escucha cómo el otro lo vivió. Sin defenderse. Solo recibir.\n\nLas heridas no procesadas no desaparecen: se convierten en la distancia que no saben explicar. 🩹\n\n💑 Juntos de Nuevo"},
  { dia:11, emoji:"🌹", titulo:"Día 11 — La sorpresa",
    push:"Hoy uno de los dos organiza una sorpresa pequeña para {pareja}. Una nota, una cena en el piso, un paseo. Lo que importa es la iniciativa. ¿Serás tú, {nombre}?",
    email_asunto:"Día 11 — Una sorpresa pequeña cambia todo",
    email_cuerpo:"Hola {nombre},\n\nHoy alguien organiza una sorpresa pequeña: una nota escondida, una cena improvisada, un paseo nocturno.\n\nNo tiene que ser costoso. Tiene que ser intencional.\n\n'La iniciativa amorosa dice: pensé en ti cuando no tenías por qué estar en mi mente.' 🌹\n\n💑 Juntos de Nuevo"},
  { dia:12, emoji:"🔑", titulo:"Día 12 — El lenguaje del amor",
    push:"{nombre}: ¿Cómo sabes que eres amado/a? Palabras, tiempo, actos, regalos o contacto físico. Hoy descubren si han estado amándose en el lenguaje equivocado.",
    email_asunto:"Día 12 — ¿Están hablando el mismo idioma del amor?",

  { dia:13, emoji:"✨", titulo:"Día 13 — Vulnerabilidad compartida",

  { dia:14, emoji:"📊", titulo:"Día 14 — Revisión de mitad",

  { dia:15, emoji:"🌅", titulo:"Semana 3 — El sueño compartido",

  { dia:16, emoji:"🌊", titulo:"Día 16 — Conversaciones profundas",

  { dia:17, emoji:"📋", titulo:"Día 17 — Sus acuerdos nuevos",

    email_cuerpo:"Hola {nombre},\n\nHoy escriben juntos 5 acuerdos de convivencia. No reglas rígidas: compromisos vivos.\n\nEjemplo: 'Nos decimos buenas noches aunque estemos enojados'.\n\nFírmenlo. Guárdenlo. Léanlo en voz alta cada primer domingo del mes. Los matrimonios sanos tienen rituales que protegen el amor en los días difíciles. 📋\n\n💑 Juntos de Nuevo"},
  { dia:18, emoji:"🤲", titulo:"Día 18 — Tocar y ser tocado",

  { dia:19, emoji:"🕊️", titulo:"Día 19 — El perdón profundo",

  { dia:20, emoji:"🎁", titulo:"Día 20 — El acto secreto",

  { dia:21, emoji:"💍", titulo:"Día 21 — La noche especial",

  { dia:22, emoji:"🔄", titulo:"Semana 4 — Conócelo/a de nuevo",

    email_cuerpo:"Hola {nombre},\n\n¡Bienvenido/a a la Semana 4: Compromiso!\n\nHoy se hacen preguntas como si se acabaran de conocer:\n• ¿Cuál es tu película favorita ahora?\n• ¿Qué música escuchas últimamente?\n• ¿Cuál es tu mayor proyecto personal hoy?\n\nLas personas cambian cada 5-7 años. El amor que no se actualiza envejece mal. 🔄\n\n💑 Juntos de Nuevo"},
  { dia:23, emoji:"📬", titulo:"Día 23 — Carta al futuro",

  { dia:24, emoji:"💰", titulo:"Día 24 — El dinero",
    push:"Hoy {nombre}: el tema que más evitan. Las finanzas. Sin reproches: ¿Qué relación tiene cada uno con el dinero? ¿Qué miedos financieros tienen? ¿Cuál es su meta común?",

    email_cuerpo:"Hola {nombre},\n\nHoy abordan el tema que más se evita: las finanzas.\n\nSin reproches. Con curiosidad:\n• ¿Qué relación tiene cada uno con el dinero?\n• ¿Qué miedos financieros tienen?\n• ¿Cuál es su meta económica común?\n\nNo resuelvan todo hoy. Solo abran el tema con honestidad. Eso ya es enorme. 💰\n\n💑 Juntos de Nuevo"},

  { dia:26, emoji:"⛪", titulo:"Día 26 — Un retiro juntos",

  { dia:27, emoji:"📝", titulo:"Día 27 — 10 razones",

  { dia:28, emoji:"🆘", titulo:"Día 28 — ¿Necesitan ayuda?",

  { dia:29, emoji:"💒", titulo:"Día 29 — Se eligen de nuevo",

const genCode=()=>Math.random().toString(36).substring(2,8).toUpperCase();

const getDayNum=(fechaInicio)=>{
  if(!fechaInicio) return 1;
  const start=new Date(fechaInicio);
  const now=new Date();
  start.setHours(0,0,0,0); now.setHours(0,0,0,0);
  const diff=Math.floor((now-start)/(1000*60*60*24))+1;
  return Math.max(1,Math.min(30,diff));
};

const parseMensaje=(template,nombre,pareja)=>
  template.replace(/\{nombre\}/g,nombre||"").replace(/\{pareja\}/g,pareja||"tu pareja");

const formatFecha=(iso)=>{
  if(!iso) return "";
  const [y,m,d]=iso.split("-");
  const meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
};

const SK_ME="jdn_me_v2";
const SK_COUPLE=(code)=>`jdn_couple_${code}`;

function saveMe(profile){
  try{ localStorage.setItem(SK_ME,JSON.stringify(profile)); }catch(e){}
}

  try{ const r=localStorage.getItem(SK_ME); return r?JSON.parse(r):null; }catch(e){return null;}
}
function saveCoupleData(code,data){
  try{ localStorage.setItem(SK_COUPLE(code),JSON.stringify(data)); }catch(e){}
}
function loadCoupleData(code){
  try{ const r=localStorage.getItem(SK_COUPLE(code)); return r?JSON.parse(r):null; }catch(e){return null;}
}
function saveDone(code,done){
  try{ localStorage.setItem(SK_DONE(code),JSON.stringify([...done])); }catch(e){}
}
function loadDone(code){
  try{ const r=localStorage.getItem(SK_DONE(code)); return r?new Set(JSON.parse(r)):new Set(); }catch(e){return new Set();}
}

// NOTIFICACIONES — con guards completos para sandbox
// ═══════════════════════════════════════════════════════════════════════
const hasNotifAPI=()=>{
  try{ return typeof window!=="undefined"&&typeof Notification!=="undefined"&&"requestPermission" in Notification; }
  catch(e){ return false; }
};

function getNotifPerm(){
  try{ return hasNotifAPI()?Notification.permission:"no-support"; }
  catch(e){ return "no-support"; }
}

async function requestNotifPermission(){
  if(!hasNotifAPI()) return "no-support";
  try{
    if(Notification.permission==="granted") return "granted";
    const result=await Notification.requestPermission();
    return result;
  }catch(e){ return "denied"; }
}

function showPushNotif(title,body){
  if(!hasNotifAPI()) return;
  try{
    if(Notification.permission!=="granted") return;
    new Notification(`💑 ${title}`,{body,tag:"jdn-daily"});
  }catch(e){}
}

function scheduleTestNotif(titulo,push,nombre,pareja){
  const t=parseMensaje(titulo,nombre,pareja);
  const b=parseMensaje(push,nombre,pareja);
  setTimeout(()=>showPushNotif(t,b),2000);
}

// COMPONENT: NOTAS EDITABLES POR DÍA
// ═══════════════════════════════════════════════════════════════════════
const MAX_WORDS = 200;

function countWords(text){
  return text.trim()==='' ? 0 : text.trim().split(/\s+/).length;
}

function DayNotes({dayNum}){
  const key = `jdn_note_dia_${dayNum}`;
  const [text,setText]=useState(()=>{ try{ return localStorage.getItem(key)||""; }catch(e){ return ""; } });
  const [saved,setSaved]=useState(false);
  const words = countWords(text);
  const over = words > MAX_WORDS;

  const handleChange=(e)=>{
    setText(e.target.value);
    setSaved(false);
  };

  const handleSave=()=>{
    try{ localStorage.setItem(key,text); setSaved(true); setTimeout(()=>setSaved(false),2000); }catch(e){}
  };

  return(
    <div style={{background:"#FFFDF5",borderRadius:12,padding:"13px 14px",marginBottom:12,
      border:`1.5px solid ${over?"#E8567A":"#F5E6A0"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div className="jk" style={{fontSize:10,fontWeight:700,letterSpacing:1.5,
          color:"#9A7800",textTransform:"uppercase"}}>
          ✏️ Mis notas del día
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="jk" style={{fontSize:11,color:over?"#E8567A":"#9A7800",fontWeight:over?700:400}}>
            {words}/{MAX_WORDS} palabras
          </span>
          <button onClick={handleSave} className="btn jk"
            style={{fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:50,
              background:saved?"#5BAD8F":"#F5A623",color:"#fff",
              boxShadow:saved?"0 2px 8px #5BAD8F40":"0 2px 8px #F5A62340"}}>
            {saved?"✓ Guardado":"Guardar"}
          </button>
        </div>
      </div>
      <textarea
        value={text}
        onChange={handleChange}
        placeholder="Escribe aquí tus reflexiones, lo que sentiste, lo que observaste en ti o en tu pareja hoy..."
        className="jk"
        rows={4}
        style={{width:"100%",resize:"vertical",border:`1px solid ${over?"#E8567A40":"#F5E6A0"}`,
          borderRadius:10,padding:"10px 12px",fontSize:13,color:"#2D1B1B",
          background:over?"#FFF5F7":"#FFFEF5",lineHeight:1.65,
          fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",
          outline:"none",minHeight:80,maxHeight:300}}
      />
      {over&&(
        <p className="jk" style={{fontSize:11,color:"#E8567A",marginTop:5,fontWeight:600}}>
          ⚠️ Has superado el límite de {MAX_WORDS} palabras. Por favor reduce tu texto.
        </p>
      )}
    </div>
  );
}

                </button>

                border:`1.5px solid ${C.soft}`,boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}>

                    <div className="fr" style={{fontSize:15,color:C.ink,fontWeight:600}}>{p.name}</div>
                    <div className="jk" style={{fontSize:11,color:C.coral,fontWeight:600,marginBottom:6}}>{p.sub}</div>
                    <p className="jk" style={{fontSize:13,color:C.ink2,lineHeight:1.65,marginBottom:6}}>{p.desc}</p>
                    <div className="jk" style={{fontSize:11,color:C.sage,fontWeight:600}}>🔗 {p.url}</div>
                  </div>

              </div>

        {/* FOOTER */}
        <div style={{marginTop:28,borderRadius:20,
          background:`linear-gradient(135deg,${C.coralL},${C.goldL},${C.sageL})`,
          padding:"22px 18px",border:`1.5px solid ${C.coral}20`,textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",gap:3,marginBottom:8}}>
            {["❤️","🧡","💛","💚","💜"].map((h,i)=><span key={i} style={{fontSize:16}}>{h}</span>)}
          </div>
          <p className="fr" style={{fontSize:14,fontStyle:"italic",color:C.ink,lineHeight:1.85,marginBottom:10}}>
            "Todavía están a tiempo.<br/>
            <strong style={{color:C.coral}}>¿Quién va a moverse primero?</strong>"
          </p>
          <p className="fr" style={{fontSize:11,color:C.coral,fontStyle:"italic"}}>
            Lic. Agustín Flores C. · 2026 · Derechos Reservados
          </p>
        </div>

      </div>

      {/* CELEBRATION DAY 30 */}
      {done.size===30&&(
        <div style={{position:"fixed",inset:0,background:"rgba(45,27,27,.75)",zIndex:999,
          display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div className="fade" style={{background:C.white,borderRadius:24,padding:"36px 28px",
            maxWidth:380,width:"100%",textAlign:"center",boxShadow:`0 20px 60px ${C.coral}30`}}>

            <p className="jk" style={{fontSize:15,color:C.ink2,lineHeight:1.75,marginBottom:16}}>

            </p>

            <Btn color={C.sage} onClick={()=>setDone(new Set())} style={{width:"100%",marginBottom:8}}>
              🌿 Celebrar y continuar
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ROOT — ORQUESTADOR DE PANTALLAS
// ═══════════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("loading");
  const [me,setMe]=useState(null);
  const [tempProfile,setTempProfile]=useState(null);

  // ── Boot ──────────────────────────────────────────────────────────
  useEffect(()=>{
    const saved=loadMe();
    if(saved){ setMe(saved); setScreen("app"); }
    else { setScreen("register"); }
  },[]);

  // ── REGISTER → Fecha inicio ───────────────────────────────────────
  const handleRegister=(profile)=>{
    setTempProfile({...profile,fechaInicio:null});
    setScreen("start-date");
  };

  // ── START DATE → Notificaciones ───────────────────────────────────
  const handleStartDate=(fecha)=>{
    setTempProfile(p=>({...p,fechaInicio:fecha}));
    setScreen("notif-setup");
  };

  // ── NOTIF SETUP → App ─────────────────────────────────────────────
  const handleNotifDone=()=>{
    saveMe(tempProfile);
    setMe(tempProfile);
    setScreen("app");
  };

  // ── RESET ─────────────────────────────────────────────────────────
  const handleReset=()=>{
    try{ localStorage.removeItem(SK_ME); }catch(e){}
    setMe(null); setTempProfile(null);
    setScreen("register");
  };

  // ── RENDER ────────────────────────────────────────────────────────
  if(screen==="loading") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:C.cream}}>
      <div style={{textAlign:"center"}}>
        <div className="pulse" style={{fontSize:48,marginBottom:12}}>💑</div>
        <p className="fr" style={{fontSize:18,color:C.coral,fontStyle:"italic"}}>Cargando tu plan...</p>
      </div>
    </div>
  );

  if(screen==="register")   return <RegisterScreen onSave={handleRegister}/>;
  if(screen==="start-date") return <StartDateScreen onSave={handleStartDate}
    existingDate={tempProfile?.fechaInicio}/>;
  if(screen==="notif-setup") return <NotifScreen profile={tempProfile}
    diaActual={getDayNum(tempProfile?.fechaInicio)} onDone={handleNotifDone}/>;
  if(screen==="app") return <MainApp me={me} onReset={handleReset}/>;

  return null;
}


    // Mount
    const rootEl = document.getElementById('root');
    ReactDOM.createRoot(rootEl).render(<App/>);
  </script>
</body>
